# ============================================================
# 🔄 Shivam Nexus — CI Pipeline
# Runs on every push & PR to main
# Steps: Build Frontend → Verify Backend syntax
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Build & Verify Frontend
  # ──────────────────────────────────────────────────────────
  frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          VITE_BACKEND_URL: https://shivam-nexus-backend.onrender.com
          VITE_GITHUB_USERNAME: shivamrk022

      - name: 📊 Report bundle size
        run: |
          echo "## 📦 Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # Job 2: Verify Backend
  # ──────────────────────────────────────────────────────────
  backend:
    name: 🐍 Backend Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 📥 Install dependencies
        run: pip install -r requirements.txt

      - name: ✅ Verify syntax
        run: |
          python -m py_compile main.py
          python -m py_compile database.py
          python -m py_compile models.py
          python -m py_compile security.py
          find routes services -name "*.py" -exec python -m py_compile {} +
          echo "✅ All Python files compile successfully"

      - name: ✅ Verify imports
        run: python -c "import main; import database; import models; print('✅ All backend modules import successfully')"
        env:
          GROQ_API_KEY: test_key_for_ci
          DATABASE_URL: sqlite:///./test.db
