services:
  - type: web
    name: shivam-nexus-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000,https://advanced-ai-eta.vercel.app
