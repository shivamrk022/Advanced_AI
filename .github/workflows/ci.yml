# ============================================================
# 🔄 Shivam Nexus — CI Pipeline
# Runs on every push & PR to main
# Steps: Lint check → Build Frontend → Verify Backend imports
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Build & Verify Frontend
  # ──────────────────────────────────────────────────────────
  frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          VITE_BACKEND_URL: https://shivam-nexus-backend.onrender.com
          VITE_GITHUB_USERNAME: shivamrk022

      - name: 📊 Report bundle size
        run: |
          echo "## 📦 Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files:" >> $GITHUB_STEP_SUMMARY
          find dist -type f -name "*.js" -o -name "*.css" | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename $f)\` — $size" >> $GITHUB_STEP_SUMMARY
          done

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Job 2: Verify Backend
  # ──────────────────────────────────────────────────────────
  backend:
    name: 🐍 Backend Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 📥 Install dependencies
        run: pip install -r requirements.txt

      - name: ✅ Verify syntax (compile check)
        run: |
          python -m py_compile main.py
          python -m py_compile database.py
          python -m py_compile models.py
          python -m py_compile security.py
          find routes services -name "*.py" -exec python -m py_compile {} +
          echo "✅ All Python files compile successfully"

      - name: ✅ Verify imports
        run: python -c "
          import main
          import database
          import models
          print('✅ All backend modules import successfully')
          "
        env:
          GROQ_API_KEY: test_key_for_ci
          DATABASE_URL: sqlite:///./test.db

      - name: 🔍 Check for security issues
        run: |
          pip install bandit
          bandit -r . -ll --skip B101 -f json -o bandit-report.json || true
          echo "## 🔒 Security Scan" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = data.get('results', [])
          if issues:
              print(f'⚠️ Found {len(issues)} potential issue(s)')
              for i in issues:
                  print(f\"- **{i['issue_severity']}**: {i['issue_text']} in \`{i['filename']}:{i['line_number']}\`\")
          else:
              print('✅ No security issues found')
          " >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # Job 3: Deploy Backend to Render (only on push to main)
  # ──────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --silent --show-error
          echo "## 🚀 Backend Deploy" >> $GITHUB_STEP_SUMMARY
          echo "✅ Render deploy triggered successfully" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # Job 4: Post-Deploy Health Check
  # ──────────────────────────────────────────────────────────
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: ⏳ Wait for Render to deploy
        run: sleep 120  # Render free tier takes ~2 min to build

      - name: 🏥 Check backend health
        run: |
          echo "## 🏥 Post-Deploy Health Check" >> $GITHUB_STEP_SUMMARY
          
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://shivam-nexus-backend.onrender.com/api/health" || echo "000")
            
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy (HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            
            echo "Attempt $i: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          
          echo "❌ Backend health check failed after 3 attempts" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: 🌐 Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://advanced-ai-eta.vercel.app" || echo "000")
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend is live (HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Frontend returned HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          fi
