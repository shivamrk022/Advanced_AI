# ============================================================
# 👁️ Shivam Nexus — PR Preview & Quality Check
# Runs on pull requests only — provides feedback before merge
# ============================================================

name: PR Preview

on:
  pull_request:
    branches: [main]

jobs:
  quality-report:
    name: 📋 Quality Report
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: 🏗️ Build & measure
        run: npm run build
        working-directory: frontend
        env:
          VITE_BACKEND_URL: https://shivam-nexus-backend.onrender.com
          VITE_GITHUB_USERNAME: shivamrk022

      - name: 💬 Comment PR with build info
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const size = execSync('du -sh frontend/dist').toString().split('\t')[0];
            
            const body = `## 🔍 Build Preview Report
            
            | Metric | Value |
            |--------|-------|
            | 📦 Bundle Size | ${size} |
            | ✅ Build Status | Passed |
            | 🕐 Timestamp | ${new Date().toISOString()} |
            
            > This PR is safe to merge. Auto-deploy will trigger on merge to \`main\`.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
